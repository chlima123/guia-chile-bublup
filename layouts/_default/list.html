<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }}</title>
</head>
<body>
  <h1>{{ .Title }}</h1>

  {{ .Content }}

  <ul>
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
      </li>
    {{ end }}
  </ul>
</body>
</html>
